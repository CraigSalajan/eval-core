# Release automation for eval-core.
#
# Publishes the crate to crates.io when a semver tag (vX.Y.Z) is pushed, then cuts a matching
# GitHub Release. Authentication uses crates.io Trusted Publishing (OIDC): no long-lived
# CARGO_REGISTRY_TOKEN is stored — `crates-io-auth-action` exchanges this workflow's GitHub OIDC
# identity for a short-lived publish token at run time.
#
# ONE-TIME SETUP (required before the first tag, or the publish step fails with an auth error):
#   crates.io -> the eval-core crate -> Settings -> Trusted Publishing -> Add a GitHub publisher:
#     Repository owner:  CraigSalajan
#     Repository name:   eval-core
#     Workflow filename: release.yml
#     Environment:       (leave blank)
#
# Cutting a release:
#   1. Bump `version` in Cargo.toml and merge it to main via PR.
#   2. git tag v0.4.0 && git push origin v0.4.0   (the tag must equal the Cargo.toml version)
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Trusted Publishing needs an OIDC token; the release step needs to create a GitHub Release.
permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Fail fast if the pushed tag doesn't match the version in Cargo.toml, so we never publish
      # the wrong code under a tag (e.g. v0.4.0 pointing at a Cargo.toml still on 0.3.0).
      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "tag=$tag  crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Test (all features)
        run: cargo test --all-features

      # Exchange this workflow's GitHub OIDC identity for a short-lived crates.io token.
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
