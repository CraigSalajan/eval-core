# CI for eval-core.
#
# This file is staged INSIDE the crate (`crates/eval-core/.github/workflows/ci.yml`) so that when
# the crate directory is later extracted into its own git repository, `.github/workflows/ci.yml`
# already sits at the repo root and "just works" with no path edits. All commands below assume the
# crate directory IS the repository root.
name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Fail fast and keep logs lean.
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `stable` = the everyday build; `1.85` pins and enforces the crate's declared MSRV
        # (edition 2024 requires Rust >= 1.85). If the MSRV row breaks, bump `rust-version`
        # in Cargo.toml in lockstep.
        rust: ["stable", "1.85"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry, index, and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      # Publish dry-run: proves the crate packages cleanly as a standalone `.crate`
      # (catches missing `exclude`d/included files, dirty tree, metadata gaps) without uploading.
      - name: Package (publish dry-run)
        run: cargo package
