# CI for eval-core.
#
# This file is staged INSIDE the crate (`crates/eval-core/.github/workflows/ci.yml`) so that when
# the crate directory is extracted into its own git repository, `.github/workflows/ci.yml` already
# sits at the repo root and "just works" with no path edits. All commands assume the crate
# directory IS the repository root.
name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Style + lints run ONLY on stable. clippy's lint set churns across releases, so running
  # `clippy -D warnings` against a pinned older MSRV toolchain is fragile (a lint can be in the
  # default group on the MSRV but moved out on stable, or vice versa). Gate lints on stable; the
  # MSRV job below proves the code still compiles + tests on the declared minimum.
  lint:
    name: lint (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  # Build + test on stable AND the declared MSRV. If the MSRV row breaks, bump `rust-version`
  # in Cargo.toml in lockstep (edition 2024 needs >= 1.85; let-chains push the real floor to 1.88).
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ["stable", "1.88"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-targets
      - name: Test (all features)
        run: cargo test --all-features
      # Publish dry-run: proves the crate packages cleanly as a standalone `.crate`
      # (catches missing included/excluded files, dirty tree, metadata gaps) without uploading.
      - name: Package (publish dry-run)
        run: cargo package
